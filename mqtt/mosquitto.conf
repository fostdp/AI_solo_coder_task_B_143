listener 1883 0.0.0.0

allow_anonymous true
persistence false

log_dest stdout
log_type error
log_type warning
log_type notice
log_type information

connection_messages true
log_timestamp true

max_connections -1

# 最大消息大小 256KB
message_size_limit 262144

# 队列大小
max_queued_messages 100000

# 单客户端inflight消息
max_inflight_messages 1000

# 保留消息限制
max_queued_bytes 0
